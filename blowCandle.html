    </div>


    <script src="script.js"></script>

    <script src=" https://cdn.jsdelivr.net/npm/@tsparticles/confetti@4.3.2/tsparticles.confetti.bundle.min.js">
    </script>
    <script>
        const duration = 15 * 1e3,
            animationEnd = Date.now() + duration;
        let skew = 1;

        function randomInRange(min, max) {
            return Math.random() * (max - min) + min;
        }
        (function frame() {
            const timeLeft = animationEnd - Date.now(),
                ticks = Math.max(200, 500 * (timeLeft / duration));
            skew = Math.max(.8, skew - .001);
            confetti({
                particleCount: 1,
                startVelocity: 0,
                ticks,
                origin: {
                    x: Math.random(),
                    y: Math.random() * skew - .2
                },
                colors: ["#ffffff"],
                shapes: ["circle"],
                gravity: randomInRange(.4, .6),
                scalar: randomInRange(.4, 1),
                drift: randomInRange(-.4, .4)
            });
            if (timeLeft > 0) requestAnimationFrame(frame);
        })();
    </script>


    </div>
</body>
